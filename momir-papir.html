<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Momir Papir</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap');
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  :root { --t:.25s ease; --radius:10px; }
  [data-theme="dark"] {
    --bg:#0b0d0e; --bg2:#101214; --text:#e8e6e2; --text-mid:#a8a6a2; --text-dim:#706e6a; --text-faint:#504e4a;
    --surface:#181a1c; --surface2:#1e2022; --border:#2a2c2e; --border-hover:#484a4c;
    --card-shadow:rgba(0,0,0,.7);
    --accent:#3db870; --accent-text:#e0f8ea; --accent-dim:#2a8050;
    --accent-bg:rgba(61,184,112,.08); --accent-border:rgba(61,184,112,.3); --accent-glow:rgba(61,184,112,.2);
    --ghost:#1a1c1e; --ghost-hover:#222426; --ghost-text:#908e8a;
    --status-bg:rgba(61,184,112,.06); --status-glow:rgba(61,184,112,.25);
    --fail:#e06060; --fail-bg:rgba(224,96,96,.08);
    --peek-bg:rgba(0,0,0,.92);
    --spinner-track:#2a2c2e;
    --overlay:rgba(11,13,14,.5);
    --texture:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.015'/%3E%3C/svg%3E");
  }
  [data-theme="light"] {
    --bg:#f0ece6; --bg2:#e8e4de; --text:#1a1816; --text-mid:#5a5856; --text-dim:#8a8886; --text-faint:#a8a6a4;
    --surface:#e0dcd6; --surface2:#d8d4ce; --border:#c8c4be; --border-hover:#a8a4a0;
    --card-shadow:rgba(0,0,0,.15);
    --accent:#1d7a42; --accent-text:#fff; --accent-dim:#166834;
    --accent-bg:rgba(29,122,66,.06); --accent-border:rgba(29,122,66,.25); --accent-glow:rgba(29,122,66,.12);
    --ghost:#d8d4ce; --ghost-hover:#ccc8c2; --ghost-text:#6a6866;
    --status-bg:rgba(29,122,66,.06); --status-glow:rgba(29,122,66,.15);
    --fail:#c03030; --fail-bg:rgba(192,48,48,.06);
    --peek-bg:rgba(0,0,0,.85);
    --spinner-track:#c8c4be;
    --overlay:rgba(240,236,230,.5);
    --texture:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");
  }

  html, body {
    min-height:100dvh; background:var(--bg); color:var(--text);
    font-family:'Cormorant Garamond',Georgia,serif; overflow-x:hidden;
    -webkit-tap-highlight-color:transparent; transition:background var(--t), color var(--t);
  }
  body::before {
    content:''; position:fixed; inset:0; background:var(--texture); pointer-events:none; z-index:0;
  }

  .app { position:relative; z-index:1; max-width:440px; margin:0 auto; padding:0 16px 32px; }
  .screen { display:none; }
  .screen.active { display:flex; flex-direction:column; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
  @keyframes summonFlash { 0%{box-shadow:0 0 0 0 var(--accent-glow)} 50%{box-shadow:0 0 0 20px transparent} 100%{box-shadow:0 0 0 0 transparent} }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

  /* ── Header ── */
  .header {
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 0; position:sticky; top:0; z-index:10;
    background:var(--bg); transition:background var(--t);
  }
  .header::after {
    content:''; position:absolute; bottom:0; left:-16px; right:-16px; height:1px;
    background:var(--border); transition:background var(--t);
  }
  .header-title {
    font-family:'Cinzel',serif; font-size:14px; font-weight:700;
    color:var(--text-dim); letter-spacing:5px; text-transform:uppercase; transition:color var(--t);
  }
  .header-actions { display:flex; gap:8px; align-items:center; }

  /* ── Icon buttons ── */
  .icon-btn {
    width:36px; height:36px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface); color:var(--text-dim); font-size:15px;
    cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center;
  }
  .icon-btn:hover { border-color:var(--border-hover); color:var(--text); background:var(--surface2); }
  .icon-btn:active { transform:scale(.95); }

  /* ── Badge button (e.g. Battlefield) ── */
  .badge-btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:7px 14px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface); color:var(--text-mid); font-size:13px;
    font-family:'Cormorant Garamond',serif; font-weight:600;
    cursor:pointer; transition:all .15s; white-space:nowrap;
  }
  .badge-btn:hover { border-color:var(--border-hover); color:var(--text); }
  .badge-btn:active { transform:scale(.97); }
  .badge-btn .badge-count {
    display:inline-flex; align-items:center; justify-content:center;
    min-width:20px; height:20px; border-radius:10px; padding:0 6px;
    background:var(--accent); color:var(--accent-text);
    font-family:'Cinzel',serif; font-size:10px; font-weight:700;
  }

  /* ── Card Frame ── */
  .card-frame { text-align:center; padding:24px 0 16px; }
  .card-frame img {
    width:100%; max-width:280px; border-radius:14px;
    box-shadow:0 12px 40px var(--card-shadow), 0 2px 8px var(--card-shadow);
    transition:box-shadow var(--t);
  }

  /* ── Section labels ── */
  .section-label {
    font-family:'Cinzel',serif; font-size:11px; font-weight:700;
    color:var(--text-faint); letter-spacing:3px; text-transform:uppercase;
    padding:4px 0 12px; transition:color var(--t);
  }

  /* ── Primary / Ghost buttons ── */
  .btn {
    cursor:pointer; border:none; outline:none; font-family:'Cinzel',serif;
    font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    padding:14px 28px; border-radius:var(--radius); font-size:15px; transition:all .2s;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn:active:not(:disabled) { transform:scale(.97); }
  .btn:disabled { opacity:.3; cursor:not-allowed; }
  .btn-primary {
    background:var(--accent); color:var(--accent-text);
    box-shadow:0 2px 16px var(--accent-glow), 0 1px 3px rgba(0,0,0,.2);
  }
  .btn-primary:hover:not(:disabled) { filter:brightness(1.1); box-shadow:0 4px 24px var(--accent-glow); }
  .btn-secondary {
    background:var(--surface); color:var(--text-mid); border:1px solid var(--border);
    box-shadow:0 1px 3px rgba(0,0,0,.08);
  }
  .btn-secondary:hover:not(:disabled) { color:var(--text); border-color:var(--border-hover); background:var(--surface2); }
  .btn-ghost { background:none; color:var(--text-dim); padding:10px 16px; letter-spacing:1px; font-size:13px; }
  .btn-ghost:hover { color:var(--text); }
  .btn-row { display:flex; gap:10px; justify-content:center; padding:20px 0; }
  .emblem-row { display:flex; gap:8px; align-items:stretch; }
  .copies-stepper {
    display:flex; align-items:center; gap:0; border-radius:var(--radius);
    border:1px solid var(--border); background:var(--surface); overflow:hidden; flex-shrink:0;
  }
  .stepper-btn {
    width:40px; height:100%; border:none; background:none; color:var(--text-mid);
    font-size:20px; font-weight:700; cursor:pointer; transition:all .15s;
    display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif;
  }
  .stepper-btn:active { background:var(--surface2); transform:scale(.93); }
  .stepper-btn:hover { color:var(--text); }
  .stepper-val {
    width:32px; text-align:center; font-family:'Cinzel',serif; font-size:16px;
    font-weight:700; color:var(--accent); user-select:none;
  }
  .setup-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 0; border-bottom:1px solid var(--border); transition:border-color var(--t);
  }
  .setup-label { color:var(--text-mid); font-size:15px; font-weight:600; transition:color var(--t); }
  .toggle-group { display:flex; gap:4px; }
  .toggle-btn {
    padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface);
    color:var(--text-dim); font-size:14px; font-weight:600; cursor:pointer; transition:all .15s;
    font-family:'Cormorant Garamond',serif;
  }
  .toggle-btn:active { transform:scale(.95); }
  .toggle-btn.on {
    border-color:var(--accent-border); color:var(--accent); background:var(--accent-bg);
  }

  /* ── Rules ── */
  .rules-text {
    color:var(--text-dim); font-size:15px; line-height:1.7; text-align:center;
    padding:16px 12px; transition:color var(--t);
  }
  .rules-text strong { color:var(--text-mid); font-weight:600; }

  /* ══════════════════════════════════════════
     PLAY SCREEN
  ══════════════════════════════════════════ */
  .play-body { flex:1; padding-top:16px; padding-bottom:140px; }

  /* CMC Grid */
  .cmc-section { padding:8px 0 0; }
  .cmc-grid {
    display:grid; grid-template-columns:repeat(5,1fr); gap:8px;
    padding:0 4px;
  }
  .cmc {
    aspect-ratio:1; border-radius:var(--radius); border:1.5px solid var(--border);
    background:var(--surface); color:var(--text-mid);
    font-family:'Cinzel',serif; font-size:18px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .15s; user-select:none;
    -webkit-user-select:none; position:relative;
  }
  .cmc:active { transform:scale(.93); }
  .cmc:hover { border-color:var(--border-hover); color:var(--text); }
  .cmc.on {
    border-color:var(--accent); color:var(--accent);
    background:var(--accent-bg); box-shadow:0 0 16px var(--accent-glow);
    transform:scale(1.05);
  }
  .cmc.on::after {
    content:''; position:absolute; inset:-3px; border-radius:calc(var(--radius) + 2px);
    border:2px solid var(--accent); opacity:.3; pointer-events:none;
  }

  /* High CMC toggle */
  .cmc-more-toggle {
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:12px 0 4px; color:var(--text-faint); font-size:13px;
    cursor:pointer; transition:color .15s; user-select:none;
    font-family:'Cinzel',serif; letter-spacing:1px;
  }
  .cmc-more-toggle:hover { color:var(--text-dim); }
  .cmc-more-toggle .arrow { transition:transform .2s; display:inline-block; }
  .cmc-more-toggle.open .arrow { transform:rotate(180deg); }
  .cmc-high { display:none; padding-top:8px; }
  .cmc-high.show { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:8px 4px 0; animation:slideDown .2s ease; }
  .cmc-high .cmc { font-size:15px; }

  /* Sticky bottom bar */
  .summon-bar {
    position:fixed; bottom:0; left:0; right:0; z-index:50;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:var(--bg); border-top:1px solid var(--border);
    transition:background var(--t), border-color var(--t);
    display:flex; justify-content:center;
  }
  .summon-bar::before {
    content:''; position:absolute; top:-20px; left:0; right:0; height:20px;
    background:linear-gradient(to top, var(--bg), transparent); pointer-events:none;
  }
  .summon-bar .btn { width:100%; max-width:440px; padding:16px 28px; font-size:16px; }

  /* ── Status card ── */
  .status-card {
    margin:16px 0; padding:20px; border-radius:var(--radius);
    border:1px solid var(--border); background:var(--surface);
    text-align:center; transition:all .3s;
    animation:fadeUp .3s ease;
  }
  .status-card.printing {
    border-color:var(--accent-border); background:var(--status-bg);
    animation:fadeUp .3s ease, summonFlash 1.5s ease infinite;
  }
  .status-card.done { border-color:var(--accent-border); background:var(--status-bg); }
  .status-card.fail { border-color:rgba(224,96,96,.2); background:var(--fail-bg); }
  .status-card .status-icon { font-size:24px; margin-bottom:8px; display:block; }
  .status-card .status-msg { font-size:15px; color:var(--text-mid); }
  .status-card .status-msg.fail-text { color:var(--fail); }
  .status-card .card-name {
    font-family:'Cinzel',serif; font-weight:700; font-size:19px; color:var(--text);
    display:block; margin-top:8px; line-height:1.3;
  }
  .status-card .card-sub {
    font-size:14px; color:var(--text-dim); margin-top:4px; display:block;
  }
  .status-card .peek-btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    margin-top:14px; padding:8px 20px; border-radius:8px;
    border:1px solid var(--border); background:var(--surface2);
    color:var(--text-mid); font-size:14px; cursor:pointer; transition:all .15s;
    font-family:'Cormorant Garamond',serif; font-weight:600;
  }
  .status-card .peek-btn:hover { border-color:var(--accent-border); color:var(--accent); }
  .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--spinner-track); border-top-color:var(--accent); border-radius:50%; animation:spin .5s linear infinite; vertical-align:middle; }
  .spinner-lg { width:28px; height:28px; }
  .shimmer-text {
    background:linear-gradient(90deg, var(--text-dim) 0%, var(--accent) 50%, var(--text-dim) 100%);
    background-size:200% 100%; -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; animation:shimmer 2s ease infinite;
  }

  /* ══════════════════════════════════════════
     LOG / BATTLEFIELD
  ══════════════════════════════════════════ */
  .log-empty {
    text-align:center; color:var(--text-faint); padding:48px 20px;
    font-style:italic; font-size:16px;
  }
  .log-item {
    display:flex; align-items:center; gap:12px; padding:14px 0;
    border-bottom:1px solid var(--border); transition:border-color var(--t);
  }
  .log-item:last-child { border-bottom:none; }
  .log-mana {
    width:38px; height:38px; border-radius:50%; flex-shrink:0;
    background:var(--surface); border:1.5px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-family:'Cinzel',serif; font-size:14px; font-weight:700; color:var(--accent);
    transition:all var(--t);
  }
  .log-info { flex:1; min-width:0; }
  .log-name {
    font-size:16px; font-weight:600; color:var(--text);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .log-type {
    font-size:13px; color:var(--text-dim); margin-top:2px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .log-pt {
    font-size:15px; color:var(--accent); font-family:'Cinzel',serif;
    font-weight:700; flex-shrink:0; padding:0 4px;
  }
  .log-actions { display:flex; gap:4px; flex-shrink:0; }
  .log-peek, .log-reprint {
    width:36px; height:36px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface); color:var(--text-dim); font-size:16px;
    cursor:pointer; transition:all .15s;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .log-peek:hover, .log-reprint:hover { border-color:var(--accent-border); color:var(--accent); background:var(--accent-bg); }
  .log-peek:active, .log-reprint:active { transform:scale(.93); }

  /* ── Peek overlay ── */
  .peek-overlay {
    position:fixed; inset:0; z-index:999; background:var(--peek-bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;
    animation:fadeUp .2s ease;
  }
  .peek-overlay img {
    max-width:340px; width:100%; border-radius:14px;
    box-shadow:0 12px 48px rgba(0,0,0,.5); pointer-events:none;
    transition:transform .4s ease;
  }
  .peek-overlay img.flipping { transform:rotateY(90deg); }
  .peek-controls {
    display:flex; gap:10px; margin-top:16px;
  }
  .peek-ctrl-btn {
    padding:10px 24px; border-radius:8px; border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.1); color:#fff; font-size:15px;
    font-family:'Cormorant Garamond',serif; font-weight:600;
    cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px;
  }
  .peek-ctrl-btn:hover { background:rgba(255,255,255,.2); }
  .peek-ctrl-btn:active { transform:scale(.95); }
  .dfc-badge {
    display:inline-flex; align-items:center; justify-content:center;
    width:20px; height:20px; border-radius:4px; font-size:11px;
    background:var(--accent-bg); border:1px solid var(--accent-border); color:var(--accent);
    flex-shrink:0; margin-left:2px;
  }

  /* ══════════ PRINT ══════════ */
  #print-zone { display:none; }

  @media print {
    * {
      background: transparent !important;
      box-shadow: none !important;
      text-shadow: none !important;
    }

    html,body {
      background:#fff!important;
      color:#000!important;
      margin:0!important;
      padding:0!important;
      min-height:0!important;
      overflow:visible!important;
      width:100%!important;
    }

    body::before { display:none!important; }

    .app,
    .summon-bar {
      display:none!important;
    }

    #print-zone {
      display:block!important;
      margin:0!important;
      padding:0!important;
      overflow:visible!important;
      width:100%!important;
    }

    #print-zone .r-img {
      filter:none!important;
      -webkit-filter:none!important;
    }

    .receipt {
      width:100%;
      margin:0 0 2mm 0!important;
      padding:0!important;
      text-align:center;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .receipt:last-child {
      margin-bottom:0!important;
    }
  }

  .receipt {
    width:100%;
    margin:0 0 2mm 0;
    padding:0;
    text-align:center;
  }
  .receipt .r-img {
    display:block; margin:0 auto; padding:0; border-radius:0;
    width:100%; height:auto;
    image-rendering:pixelated;
  }
  .receipt .r-sep { margin:2mm auto 0; width:100%; border-top:3px dashed #000; }
</style>
</head>
<body>

<div id="print-zone"></div>

<div class="app">

  <!-- ═══════════════════ HOME ═══════════════════ -->
  <div id="s-home" class="screen active">
    <div class="header">
      <div class="header-title">Momir Papir</div>
      <div class="header-actions">
        <div id="nav-home"></div>
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme"></button>
      </div>
    </div>

    <div class="card-frame" id="momir-frame">
      <div style="color:var(--text-faint);font-size:15px;padding:48px 0;">
        <span class="spinner"></span>
      </div>
    </div>

    <div class="setup-row">
      <div class="setup-label">Paper</div>
      <div class="toggle-group" id="paper-btns">
        <button class="toggle-btn on" onclick="setPaper('2in')">2″</button>
        <button class="toggle-btn" onclick="setPaper('3in')">3″</button>
        <button class="toggle-btn" onclick="setPaper('4in')">4″</button>
      </div>
    </div>

    <div class="btn-row" style="flex-direction:column;gap:10px;padding:24px 0;">
      <button class="btn btn-primary" style="width:100%" onclick="go('play')">Start Game</button>
      <div class="emblem-row">
        <button class="btn btn-secondary" style="flex:1" onclick="printEmblems()">Print Emblems</button>
        <div class="copies-stepper">
          <button class="stepper-btn" onclick="adjustCopies(-1)">−</button>
          <span class="stepper-val" id="copies-val">1</span>
          <button class="stepper-btn" onclick="adjustCopies(1)">+</button>
        </div>
      </div>
    </div>

    <div class="rules-text">
      Each player starts with <strong>24 life</strong> and a 60-card deck of basic lands.
      Once per turn, as a sorcery: pay <strong>{X}</strong>, discard a card, and create a token copy of a random creature with mana value X.
    </div>
  </div>

  <!-- ═══════════════════ PLAY ═══════════════════ -->
  <div id="s-play" class="screen">
    <div class="header">
      <div class="header-title">Momir Papir</div>
      <div class="header-actions">
        <button class="badge-btn" id="log-btn" onclick="go('log')" style="display:none;">
          Battlefield <span class="badge-count" id="log-count">0</span>
        </button>
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme"></button>
        <button class="icon-btn" onclick="go('home')" title="Back to setup" style="font-size:18px;">✕</button>
      </div>
    </div>

    <div class="play-body">
      <div class="cmc-section">
        <div class="section-label">Mana Value</div>
        <div class="cmc-grid" id="cmc-grid"></div>
        <div class="cmc-more-toggle" id="cmc-more-toggle" onclick="toggleHighCMC()">
          <span>9 – 16</span>
          <span class="arrow">▾</span>
        </div>
        <div class="cmc-high" id="cmc-high"></div>
      </div>

      <div id="status-area"></div>
    </div>

    <div class="summon-bar" id="summon-bar" style="display:none;">
      <button id="summon-btn" class="btn btn-primary" onclick="summon()" disabled>Summon</button>
    </div>
  </div>

  <!-- ═══════════════════ LOG ═══════════════════ -->
  <div id="s-log" class="screen">
    <div class="header">
      <div class="header-title">Battlefield</div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme"></button>
        <button class="badge-btn" onclick="go('play')">← Back</button>
      </div>
    </div>
    <div id="log-list" style="padding-top:8px;"></div>
  </div>

</div>

<div id="peek" class="peek-overlay" style="display:none;"></div>

<script>
let cmc = null, log = [];
let momirImg = '', momirData = null;
let turnNumber = 0, summoning = false;
let highCMCOpen = false;
let emblemCopies = 1;

// At 8 dots/mm: card = 63mm = 504 dots.
// Paper total widths determine canvas size.
// On 2" the card is wider than the bed, so we just fill it.
// On 3"/4" we dither card at 504px then pad with white to fill the paper.
const PAPER = {
  '2in': { total: 384 },   // ~48mm printable
  '3in': { total: 576 },   // ~72mm printable
  '4in': { total: 832 },   // ~104mm printable
};
const CARD_W = 504; // 63mm × 8 dots/mm
let paperKey = '2in';

function setPaper(key) {
  paperKey = key;
  document.querySelectorAll('#paper-btns .toggle-btn').forEach(b =>
    b.classList.toggle('on', b.textContent.includes(key.charAt(0)))
  );
  try { localStorage.setItem('momir-paper', key); } catch(e) {}
}
(function() {
  try {
    const s = localStorage.getItem('momir-paper');
    if (PAPER[s]) setPaper(s);
  } catch(e) {}
})();

function adjustCopies(d) {
  emblemCopies = Math.max(1, Math.min(10, emblemCopies + d));
  document.getElementById('copies-val').textContent = emblemCopies;
}

// ── Theme ──
function getTheme() { return document.documentElement.getAttribute('data-theme'); }
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('momir-theme', t); } catch(e) {}
  updateToggleIcons();
}
function toggleTheme() { setTheme(getTheme()==='dark'?'light':'dark'); }
function updateToggleIcons() {
  const icon = getTheme()==='dark' ? '☀' : '☾';
  document.querySelectorAll('.icon-btn[title="Toggle theme"]').forEach(b => b.textContent = icon);
}
(function() {
  try { const s = localStorage.getItem('momir-theme'); if (s) document.documentElement.setAttribute('data-theme', s); } catch(e) {}
  updateToggleIcons();
})();

// ── Load Momir Vig Vanguard ──
(async function() {
  try {
    const r = await fetch('https://api.scryfall.com/cards/search?q=momir+vig+t%3Avanguard&unique=cards');
    const d = await r.json();
    if (d.data?.length) {
      momirData = d.data[0];
      momirImg = momirData.image_uris?.large || momirData.image_uris?.normal || '';
      document.getElementById('momir-frame').innerHTML = momirImg
        ? '<img src="'+momirImg+'" alt="Momir Vig, Simic Visionary" crossorigin="anonymous">'
        : '<div style="color:var(--text-mid);padding:20px;">Could not load card image</div>';
    }
  } catch(e) {
    document.getElementById('momir-frame').innerHTML = '<div style="color:var(--text-mid);padding:20px;">Offline — check connection</div>';
  }
})();

// ── Screens ──
function go(s) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  const screen = document.getElementById('s-'+s);
  screen.classList.add('active');
  // Show/hide sticky summon bar
  document.getElementById('summon-bar').style.display = s==='play' ? '' : 'none';
  if (s==='play') initPlay();
  if (s==='log') renderLog();
  if (s==='home') updateHomeNav();
}
function updateHomeNav() {
  const n = document.getElementById('nav-home');
  n.innerHTML = log.length
    ? '<button class="badge-btn" onclick="go(\'play\')">Resume <span class="badge-count">'+log.length+'</span></button>'
    : '';
}

// ── Play ──
function initPlay() {
  // Main grid: 0-8
  const grid = document.getElementById('cmc-grid');
  grid.innerHTML = '';
  for (let i=0; i<=8; i++) {
    ((v)=>{
      const b = document.createElement('button');
      b.className = 'cmc'+(cmc===v?' on':'');
      b.textContent = v;
      b.onclick = () => pickCMC(v);
      grid.appendChild(b);
    })(i);
  }
  // High CMC: 9-16
  const high = document.getElementById('cmc-high');
  high.innerHTML = '';
  for (let i=9; i<=16; i++) {
    ((v)=>{
      const b = document.createElement('button');
      b.className = 'cmc'+(cmc===v?' on':'');
      b.textContent = v;
      b.onclick = () => pickCMC(v);
      high.appendChild(b);
    })(i);
  }
  // Restore high CMC state
  const toggle = document.getElementById('cmc-more-toggle');
  if (highCMCOpen) { high.classList.add('show'); toggle.classList.add('open'); }
  else { high.classList.remove('show'); toggle.classList.remove('open'); }
  // If selected cmc >= 9, auto-open
  if (cmc !== null && cmc >= 9) {
    highCMCOpen = true;
    high.classList.add('show'); toggle.classList.add('open');
  }

  updateSummon();
  const lb = document.getElementById('log-btn');
  lb.style.display = log.length ? '' : 'none';
  document.getElementById('log-count').textContent = log.length;
  if (!summoning && log.length) showLastSummon();
}

function toggleHighCMC() {
  highCMCOpen = !highCMCOpen;
  document.getElementById('cmc-high').classList.toggle('show', highCMCOpen);
  document.getElementById('cmc-more-toggle').classList.toggle('open', highCMCOpen);
}

function pickCMC(v) {
  cmc = v;
  document.querySelectorAll('#cmc-grid .cmc').forEach((b,i)=>b.classList.toggle('on',i===v));
  document.querySelectorAll('#cmc-high .cmc').forEach((b,i)=>b.classList.toggle('on',(i+9)===v));
  updateSummon();
}

function updateSummon() {
  const b = document.getElementById('summon-btn');
  b.disabled = cmc===null||summoning;
  if (summoning) {
    b.innerHTML = '<span class="spinner" style="border-top-color:var(--accent-text);border-color:rgba(255,255,255,.3);"></span>';
  } else {
    b.textContent = cmc!==null ? 'Summon · MV '+cmc : 'Choose Mana Value';
  }
}

function showLastSummon() {
  if (!log.length) return;
  const last = log[0];
  const sa = document.getElementById('status-area');
  sa.innerHTML = `<div class="status-card done">
    <span class="status-icon">✓</span>
    <span class="card-name">${esc(last.name)}${last.isDFC?' <span class="dfc-badge">↷</span>':''}</span>
    <span class="card-sub">${esc(last.type)}${last.power!=null?' · '+last.power+'/'+last.toughness:''}</span>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:14px;">
      ${last.imgLg?'<button class="peek-btn" onclick="reprint(0)">🖨 Reprint</button>':''}
      ${last.img?'<button class="peek-btn" onclick="peekCard(0)">👁 View</button>':''}
    </div>
  </div>`;
}

// ── Summon → print blind ──
async function summon() {
  if (cmc===null||summoning) return;
  summoning = true;
  const sa = document.getElementById('status-area');
  updateSummon();
  sa.innerHTML = '<div class="status-card printing"><span class="spinner spinner-lg"></span><br><span class="status-msg shimmer-text" style="margin-top:12px;display:inline-block;">Summoning creature…</span></div>';

  try {
    const q = 't:creature mv=' + cmc + ' -is:funny';
    const r = await fetch('https://api.scryfall.com/cards/random?q='+encodeURIComponent(q));
    if (!r.ok) {
      if (r.status===404) { sa.innerHTML='<div class="status-card fail"><span class="status-icon">✗</span><span class="status-msg fail-text">No creatures exist at MV '+cmc+'</span></div>'; summoning=false; updateSummon(); return; }
      throw new Error('Scryfall error '+r.status);
    }
    const card = await r.json();
    await processCard(card);
  } catch(e) {
    sa.innerHTML = '<div class="status-card fail"><span class="status-icon">✗</span><span class="status-msg fail-text">'+esc(e.message)+'</span></div>';
  }
  summoning = false;
  updateSummon();
}

async function processCard(card) {
  const sa = document.getElementById('status-area');
  turnNumber++;
  const isDFC = !card.image_uris && card.card_faces?.length >= 2;
  const imgUrl = card.image_uris?.normal || card.card_faces?.[0]?.image_uris?.normal || '';
  const imgLg = card.image_uris?.large || card.card_faces?.[0]?.image_uris?.large || imgUrl;
  const img2 = isDFC ? (card.card_faces[1].image_uris?.normal || '') : '';
  const imgLg2 = isDFC ? (card.card_faces[1].image_uris?.large || img2) : '';
  log.unshift({ turn:turnNumber, name:card.name, type:card.type_line, power:card.power, toughness:card.toughness, cmc, img:imgUrl, imgLg, img2, imgLg2, isDFC, ts:Date.now() });
  document.getElementById('log-btn').style.display = '';
  document.getElementById('log-count').textContent = log.length;

  sa.innerHTML = '<div class="status-card printing"><span class="spinner spinner-lg"></span><br><span class="status-msg" style="margin-top:12px;display:inline-block;">Dithering & printing…</span></div>';
  if (isDFC) {
    sa.innerHTML = '<div class="status-card printing"><span class="spinner spinner-lg"></span><br><span class="status-msg" style="margin-top:12px;display:inline-block;">Double-faced card — printing both sides…</span></div>';
    await autoPrintDFC(imgLg, imgLg2);
  } else {
    await autoPrint(imgLg);
  }

  sa.innerHTML = `<div class="status-card done">
    <span class="status-icon">✓</span>
    <span class="card-name">${esc(card.name)}${isDFC?' <span class="dfc-badge">↷</span>':''}</span>
    <span class="card-sub">${esc(card.type_line||'')}${card.power!=null?' · '+card.power+'/'+card.toughness:''}</span>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:14px;">
      ${imgLg?'<button class="peek-btn" onclick="reprint(0)">🖨 Reprint</button>':''}
      ${imgUrl?'<button class="peek-btn" onclick="peekCard(0)">👁 View</button>':''}
    </div>
  </div>`;
  cmc = null;
  document.querySelectorAll('#cmc-grid .cmc, #cmc-high .cmc').forEach(b=>b.classList.remove('on'));
}

// ── Floyd-Steinberg dithering ──
function ditherImage(imgUrl) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const paper = PAPER[paperKey].total;
      // Card dither width: real MTG card (504px) or paper width if smaller
      const cardW = Math.min(CARD_W, paper);
      const cardH = Math.round((img.naturalHeight / img.naturalWidth) * cardW);

      // Dither the card onto a card-sized canvas
      const cardCv = document.createElement('canvas');
      cardCv.width = cardW; cardCv.height = cardH;
      const cardCtx = cardCv.getContext('2d');
      cardCtx.drawImage(img, 0, 0, cardW, cardH);
      const imageData = cardCtx.getImageData(0, 0, cardW, cardH);
      const d = imageData.data;

      const gamma = 0.82, brightness = 5;
      for (let i = 0; i < d.length; i += 4) {
        let g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
        g = 255 * Math.pow(g/255, gamma);
        g = Math.min(255, g + brightness);
        d[i] = d[i+1] = d[i+2] = g;
      }

      for (let y = 0; y < cardH; y++) {
        for (let x = 0; x < cardW; x++) {
          const idx = (y*cardW+x)*4;
          const old = d[idx];
          const nw = old < 120 ? 0 : 255;
          d[idx] = d[idx+1] = d[idx+2] = nw;
          const err = old - nw;
          if (x+1<cardW)             d[idx+4]         += err*7/16;
          if (y+1<cardH && x>0)     d[idx+cardW*4-4]  += err*3/16;
          if (y+1<cardH)            d[idx+cardW*4]    += err*5/16;
          if (y+1<cardH && x+1<cardW) d[idx+cardW*4+4]+= err*1/16;
        }
      }
      cardCtx.putImageData(imageData, 0, 0);

      // If paper is wider than the card, pad with white and center
      if (paper > cardW) {
        const padL = Math.round((paper - cardW) / 2);
        const outCv = document.createElement('canvas');
        outCv.width = paper; outCv.height = cardH;
        const outCtx = outCv.getContext('2d');
        outCtx.fillStyle = '#fff';
        outCtx.fillRect(0, 0, paper, cardH);
        outCtx.drawImage(cardCv, padL, 0);
        resolve(outCv.toDataURL('image/png'));
      } else {
        resolve(cardCv.toDataURL('image/png'));
      }
    };
    img.onerror = () => reject(new Error('Image load failed'));
    img.src = imgUrl;
  });
}

function receiptHtml(imgTag) {
  return '<div class="receipt">' + imgTag + '<div class="r-sep"></div></div>';
}

async function waitForPrintImages(root) {
  const imgs = Array.from(root.querySelectorAll('img'));

  await Promise.all(imgs.map(async (img) => {
    if (!img.complete || !img.naturalWidth) {
      await new Promise((resolve, reject) => {
        const onLoad = () => {
          img.removeEventListener('load', onLoad);
          img.removeEventListener('error', onError);
          resolve();
        };
        const onError = () => {
          img.removeEventListener('load', onLoad);
          img.removeEventListener('error', onError);
          reject(new Error('Image load failed'));
        };
        img.addEventListener('load', onLoad, { once: true });
        img.addEventListener('error', onError, { once: true });
      });
    }

    if (typeof img.decode === 'function') {
      try { await img.decode(); } catch (_) {}
    }
  }));
}

function doPrint(opts) {
  let s = document.getElementById('dynamic-page-style');

  if (!s) {
    s = document.createElement('style');
    s.id = 'dynamic-page-style';
    document.head.appendChild(s);
  }

  // Force page-break after EVERY receipt (including last).
  // Add @page bottom margin so the printer must advance past the card.
  s.textContent = `
    @page { margin: 0 0 50mm 0; }
    .receipt {
      break-after:page;
      page-break-after:always;
    }
  `;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      window.print();
      setTimeout(() => { s.textContent = ''; }, 2000);
    });
  });
}

async function autoPrint(imgUrl) {
  const z = document.getElementById('print-zone');
  try {
    const dithered = await ditherImage(imgUrl);
    z.innerHTML = receiptHtml('<img class="r-img" src="' + dithered + '">');
  } catch(e) {
    z.innerHTML = receiptHtml('<img class="r-img" crossorigin="anonymous" src="' + imgUrl + '" style="filter:grayscale(1) brightness(1.3);">');
  }
  await waitForPrintImages(z);
  doPrint();
}

// ── Log ──
function renderLog() {
  const el = document.getElementById('log-list');
  if (!log.length) { el.innerHTML='<div class="log-empty">No creatures summoned yet</div>'; return; }
  el.innerHTML = log.map((h,idx) => `<div class="log-item">
    <div class="log-mana">${h.cmc}</div>
    <div class="log-info">
      <div class="log-name">${esc(h.name)}${h.isDFC?' <span class="dfc-badge">↷</span>':''}</div>
      <div class="log-type">${esc(h.type||'')}</div>
    </div>
    ${h.power!=null?'<div class="log-pt">'+h.power+'/'+h.toughness+'</div>':''}
    <div class="log-actions">
      ${h.imgLg?'<button class="log-reprint" onclick="reprint('+idx+')" title="Reprint">🖨</button>':''}
      ${h.img?'<button class="log-peek" onclick="peekCard('+idx+')" title="View card">👁</button>':''}
    </div>
  </div>`).join('');
}

let peekState = { faces: [], current: 0 };

function peekCard(idx) {
  const entry = log[idx];
  if (!entry) return;
  peekState.faces = [entry.img];
  if (entry.isDFC && entry.img2) peekState.faces.push(entry.img2);
  peekState.current = 0;
  renderPeek();
}

function peek(url) {
  peekState.faces = [url];
  peekState.current = 0;
  renderPeek();
}

function renderPeek() {
  const el = document.getElementById('peek');
  const url = peekState.faces[peekState.current];
  const hasTwoFaces = peekState.faces.length > 1;
  const sideLabel = peekState.current === 0 ? 'Front' : 'Back';
  el.innerHTML = `
    <img id="peek-img" src="${url}" alt="Card">
    <div class="peek-controls">
      ${hasTwoFaces ? '<button class="peek-ctrl-btn" onclick="event.stopPropagation();flipPeek()">↷ Flip to '+(peekState.current===0?'Back':'Front')+'</button>' : ''}
      <button class="peek-ctrl-btn" onclick="event.stopPropagation();closePeek()">✕ Close</button>
    </div>
  `;
  el.style.display = 'flex';
  el.onclick = function(e) {
    if (e.target === el) closePeek();
  };
}

function flipPeek() {
  const img = document.getElementById('peek-img');
  img.classList.add('flipping');
  setTimeout(() => {
    peekState.current = peekState.current === 0 ? 1 : 0;
    img.src = peekState.faces[peekState.current];
    img.classList.remove('flipping');
  }, 200);
}

function closePeek() { document.getElementById('peek').style.display = 'none'; }

async function reprint(idx) {
  const entry = log[idx];
  if (!entry || !entry.imgLg) return;
  if (entry.isDFC && entry.imgLg2) {
    await autoPrintDFC(entry.imgLg, entry.imgLg2);
  } else {
    await autoPrint(entry.imgLg);
  }
}

async function autoPrintDFC(frontUrl, backUrl) {
  // Print each face as a SEPARATE print job — avoids last-page cutoff
  await autoPrint(frontUrl);
  // Wait for user to dismiss print dialog / printer to finish
  await new Promise(r => {
    const done = () => { window.removeEventListener('afterprint', done); r(); };
    window.addEventListener('afterprint', done);
    // Fallback in case afterprint doesn't fire
    setTimeout(r, 3000);
  });
  await autoPrint(backUrl);
}

// ── Emblem printing ──
async function printEmblems() {
  if (!momirImg) return;
  const z = document.getElementById('print-zone');
  try {
    const dithered = await ditherImage(momirImg);
    let h = '';
    for (let i = 0; i < emblemCopies; i++) {
      h += receiptHtml('<img class="r-img" src="' + dithered + '">');
    }
    z.innerHTML = h;
  } catch(e) {
    let h = '';
    for (let i = 0; i < emblemCopies; i++) {
      h += receiptHtml('<img class="r-img" crossorigin="anonymous" src="' + momirImg + '" style="filter:grayscale(1) brightness(1.3);">');
    }
    z.innerHTML = h;
  }
  await waitForPrintImages(z);
  doPrint();
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
</script>
</body>
